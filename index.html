<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPE Simulator - Тренажер настройки</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div>
            <div id="mode-selector">
                <button onclick="setMode('training')">Тренировка</button>
                <button onclick="setMode('exam')">Практика</button>
            </div>
            <div id="device-width-selector">
                <button onclick="setDeviceWidth('1920')">Роутер</button>
                <button onclick="setDeviceWidth('1280')">ПК</button>
                <button onclick="setDeviceWidth('1024')">Тв приставка</button>
           </div>
        </div>
    </header>
    <!-- ЭКРАН ПК -->
    <div id="view-pc" class="screen-view hidden">
        <div class="pc-desktop">
            
            <!-- ОКНО: Настройки сетевой карты (как на фото) -->
            <div class="window adapter-settings">
                <div class="window-header">Свойства: IP версии 4 (TCP/IPv4)</div>
                <div class="window-body">
                    <p class="desc">Параметры IP можно назначать автоматически...</p>
                    
                    <div class="radio-group">
                        <input type="radio" name="ip-mode" id="ip-auto" checked onclick="toggleIpFields(false)">
                        <label for="ip-auto">Получить IP-адрес автоматически</label>
                    </div>
                    
                    <div class="radio-group">
                        <input type="radio" name="ip-mode" id="ip-manual" onclick="toggleIpFields(true)">
                        <label for="ip-manual">Использовать следующий IP-адрес:</label>
                    </div>

                    <div class="input-fields" id="ip-fields">
                        <div class="field-row"><span>IP-адрес:</span> <input type="text" class="ip-input" placeholder="... . ... . ... . ..."></div>
                        <div class="field-row"><span>Маска подсети:</span> <input type="text" class="ip-input"></div>
                        <div class="field-row"><span>Основной шлюз:</span> <input type="text" class="ip-input"></div>
                    </div>
                    
                    <div class="window-footer">
                        <button class="win-btn" onclick="applyNetworkSettings()">ОК</button>
                        <button class="win-btn">Отмена</button>
                    </div>
                </div>
            </div>

            <!-- ОКНО: Командная строка -->
            <div class="window cmd-window">
                <div class="window-header">Командная строка</div>
                <div id="cmd-output" class="cmd-body">
                    <div class="cmd-line">Microsoft Windows [Version 10.0.19045.4170]</div>
                    <div class="cmd-line">(c) Корпорация Майкрософт (Microsoft Corp.). Все права защищены.</div>
                    <br>
                </div>
                <div class="cmd-input-area">
                    <span>C:\Users\Admin></span>
                    <input type="text" id="cmd-input" autofocus onkeypress="handleCmd(event)">
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
